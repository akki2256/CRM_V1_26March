server:
  port: 8080

# Oracle: override with DATASOURCE_URL / DATASOURCE_USERNAME / DATASOURCE_PASSWORD for other environments.
# Defaults match Oracle XE / local PDB service XEPDB1.
# Examples:
#   PDB service: jdbc:oracle:thin:@//localhost:1521/XEPDB1
#   PDB service: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
#   SID style:   jdbc:oracle:thin:@localhost:1521:XE
spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: ${DATASOURCE_USERNAME:SYSTEM}
    password: "${DATASOURCE_PASSWORD:Oracle@1234}"
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-init-sql: ALTER SESSION SET TIME_ZONE = 'UTC'
      data-source-properties:
        oracle.jdbc.timezoneAsRegion: false
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
      naming:
        # Do not rewrite @Column names (e.g. "username" → user_name / USER_NAME mismatch on Oracle).
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.OracleDialect
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-min-256-bits-for-hs256-please-use-long-random-string-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  security:
    max-login-attempts: 5
  mail:
    from: ${MAIL_FROM:noreply@example.com}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
