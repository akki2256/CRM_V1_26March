# Optional: run without Oracle — start with Maven profile h2 and this profile active:
#   .\mvnw.cmd spring-boot:run -Ph2 -Dspring-boot.run.profiles=h2
spring:
  datasource:
    url: jdbc:h2:mem:crm;MODE=Oracle;DATABASE_TO_LOWER=FALSE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
